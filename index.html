<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="theme-toggle login-theme">
        <button id="themeToggleBtn" aria-label="Toggle Dark Mode">🌙</button>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Smart Attendance System</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div class="error-message" id="loginError">Incorrect username or password.</div>
                
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            
            <div class="login-hint">Hint: admin / admin123</div>
        </div>
    </div>

    <!-- Script at the end for performance -->
    <script src="script.js"></script>
</body>
</html>
