<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack Pro - Secure Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i data-lucide="shield-check"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Academic Management Portal - EduTrack Pro</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>
            
            <div id="loginError" style="color: var(--danger); font-size: 0.8125rem; margin-bottom: 1rem; display: none; text-align: center; font-weight: 500;">
                <i data-lucide="alert-circle" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i>
                Invalid username or password
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">
                Sign In
                <i data-lucide="arrow-right"></i>
            </button>
        </form>
        
        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
            <p style="font-size: 0.75rem; color: var(--text-muted);">
                System version 2.1.0 • Secure Session
            </p>
            <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 0.5rem;">
                <div id="themeToggleBtn" class="theme-switch" aria-label="Toggle Theme">
                    <i data-lucide="moon"></i>
                </div>
                <a href="index.html" class="btn btn-outline btn-icon" title="Return Home"><i data-lucide="home"></i></a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
