<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack Pro - Create Account</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i data-lucide="user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join EduTrack Pro Academic Portal</p>
        </div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" placeholder="e.g. jsmith" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Create Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check"></i>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
                </div>
            </div>
            
            <div id="signupError" style="color: var(--danger); font-size: 0.8125rem; margin-bottom: 1rem; display: none; text-align: center; font-weight: 500;">
                Something went wrong
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; margin-bottom: 1.5rem;">
                Register Now
                <i data-lucide="arrow-right"></i>
            </button>

            <div style="text-align: center; font-size: 0.875rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
            </div>
        </form>
        
        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
            <p style="font-size: 0.75rem; color: var(--text-muted);">
                Secure Registration • System v2.1.0
            </p>
            <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 0.5rem;">
                <div id="themeToggleBtn" class="theme-switch" aria-label="Toggle Theme">
                    <i data-lucide="moon"></i>
                </div>
                <a href="index.html" class="btn btn-outline btn-icon" title="Return Home"><i data-lucide="home"></i></a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
